<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Practicando CSS Grid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    
    .contenedor {
        display : grid;
       grid-template-columns : 400px 300px 100px; 
    }
    
    .item {
      background-color: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
      border: 1px solid white;
    }
    
    /* Aquí irán tus experimentos con Grid */
    
  </style>
</head>
<body>
  <h1>Experimentando con CSS Grid</h1>
  
  <h2>Grid básico</h2>
  <div class="contenedor">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
  </div>
</body>
</html>
